root = "."
tmp_dir = "tmp"
testdata_dir = "testdata"
env_files = [".env"]

[build]
  cmd = "go build -o ./tmp/main ./cmd/api"
  bin = "./tmp/main"
  delay = 200
  exclude_dir = ["tmp", "vendor", "testdata", "storage", "resources", ".git", ".claude"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = ""
  include_dir = ["cmd", "internal"]
  include_ext = ["go", "tpl", "tmpl", "html", "env"]
  include_file = [".env"]
  kill_delay = "500ms"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  post_cmd = []
  pre_cmd = []
  rerun = false
  rerun_delay = 500
  send_interrupt = true
  stop_on_error = true
  args_bin = []

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  silent = false
  time = true

[misc]
  clean_on_exit = true

[proxy]
  enabled = false
  app_port = 0
  proxy_port = 0
  app_start_timeout = 0

[screen]
  clear_on_rebuild = false
  keep_scroll = true